<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gracias — Atelier 161</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,500;0,700;1,300;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#EFEDE9;
    --mocha:#60564A;
    --ink:#363231;
    --ink-soft:rgba(54,50,49,0.62);
    --serif:'Hanken Grotesk', sans-serif;
    --sans:'Hanken Grotesk', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--mocha);
    color:var(--cream);
    font-family:var(--sans);
    font-weight:300;
    -webkit-font-smoothing:antialiased;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 24px;
  }
  .card{max-width:520px;}
  .mark{
    font-family:var(--serif); font-style:italic; font-size:15px;
    color:rgba(239,237,233,0.65); letter-spacing:0.05em; margin-bottom:28px;
  }
  h1{
    font-family:var(--serif); font-weight:500; font-size:clamp(30px,5vw,44px);
    line-height:1.15; margin-bottom:20px; letter-spacing:-0.01em;
  }
  p{
    font-size:16px; line-height:1.7; color:rgba(239,237,233,0.8);
    max-width:420px; margin:0 auto 36px;
  }
  a.btn{
    display:inline-flex; align-items:center; justify-content:center;
    padding:16px 34px; border-radius:999px; font-size:14px;
    letter-spacing:0.03em; font-weight:300;
    background:var(--cream); color:var(--ink); text-decoration:none;
    transition:transform .25s ease;
  }
  a.btn:hover{transform:translateY(-2px);}
</style>
</head>
<body>
  <div class="card">
    <div class="mark">Atelier 161</div>
    <h1>¡Gracias por contactarnos!</h1>
    <p>Recibimos tu mensaje y nos pondremos en contacto contigo muy pronto para platicar sobre tu proyecto.</p>
    <a href="/" class="btn">Volver al inicio</a>
  </div>
</body>
</html>
